# Robo67 peg-in-hole configuration. See robo67_insertion/config_schema.py for the schema.
# Values are the design defaults; tune workspace_aabb + contact params in Phase 3/5.

stiffness:
  free_translational: 1000.0   # firmer free-space tracking (tuned in sim Phase 3)
  free_rotational: 30.0
  contact_translational_xy: 150.0
  contact_z: 600.0
  contact_rotational: 20.0
  damping_ratio: 0.9
  nullspace_stiffness: 10.0

spiral:
  max_radius_m: 0.012
  pitch_m: 0.002
  speed_mps: 0.005
  pts_per_rev: 36

safety:
  # SIM-observed generous bounds (sim home EE ~ x0.21 y0.00 z1.10).
  # PHASE 4 TODO: re-tighten to the real reachable workspace (real Panda z_max ~0.9).
  workspace_aabb: [[0.05, 0.75], [-0.50, 0.50], [0.05, 1.20]]
  max_lead_m: 0.05      # MUST stay < 0.1 (controller rejects desired > 0.1 m from current)
  fz_abort_n: 25.0
  watchdog_s: 0.2

insertion:
  standoff_m: 0.05
  approach_tol_m: 0.010
  contact_fz_threshold_n: 5.0
  insert_depth_m: 0.04
  z_drop_threshold_m: 0.004
  retry_limit: 3
  control_rate_hz: 50.0

# Opt-in force-guided (admittance) search/seat (ADR-0002). enabled:false keeps
# the current verified fixed-equilibrium behavior. See
# docs/architecture/force-guided-insertion-2026-06-26.md.
force_search:
  enabled: false
  search_press_n: 5.0
  insert_press_n: 6.0
  k_adm: 0.0008
  v_cap_mps: 0.01
  ramp_s: 0.5
  fz_filter_alpha: 0.2
  slacken_frac: 0.4
  confirm_drop_m: 0.003
  confirm_window_s: 1.0
  spiral_freeze_on_slacken: true
  settle_s: 0.4
  max_force_n: 12.0

topics:
  # VERIFIED against the running sim (Phase 0.3). See PHASE0_VERIFIED.md.
  controller_name: panda_cartesian_impedance_controller
  arm_resource: panda
  desired_pose: /panda/panda_cartesian_impedance_controller/desired_pose
  parameters: /panda/panda_cartesian_impedance_controller/parameters
  set_controllers: /multi_mode_controller/set_controllers
  robot_state: /franka_robot_state_broadcaster/robot_state
  error_recovery: /panda_error_recovery_service_server/error_recovery
  gripper_ns: /panda_gripper_sim_node
  socket_pose: /robo67/socket_pose
  socket_detection: /robo67/socket_detection
  servo_correction: /robo67/servo_correction
  # cable insertion: overhead I/O-box detection (box_detector_node)
  box_pose: /robo67/box_pose
  box_detection: /robo67/box_detection
  # Logging: camera feeds (sensor_msgs/CompressedImage, "jpeg").
  # Raw = dedicated camera_publisher (owns the device); overlay = detector-annotated.
  cam_overhead_raw: /robo67/camera/overhead/image_raw/compressed
  cam_overhead_overlay: /robo67/camera/overhead/overlay/compressed
  cam_gripper_raw: /robo67/camera/gripper/image_raw/compressed
  cam_gripper_overlay: /robo67/camera/gripper/overlay/compressed
  # Logging: insertion telemetry (hardware_insertion_node --publish-telemetry).
  insertion_phase: /robo67/insertion/phase
  insertion_ee_pose: /robo67/insertion/ee_pose
  insertion_ee_speed: /robo67/insertion/ee_speed
  insertion_command_pose: /robo67/insertion/command_pose
  insertion_wrench: /robo67/insertion/wrench
  insertion_fz: /robo67/insertion/fz
  insertion_fz_baseline: /robo67/insertion/fz_baseline
  insertion_contact: /robo67/insertion/contact
  insertion_retries: /robo67/insertion/retries
  insertion_diagnostics: /robo67/insertion/diagnostics

camera:
  # Bare /dev/videoN numbers renumber across replug/reboot, so reference the
  # overhead C920 by its STABLE by-id symlink. grab_frame_gst accepts either a
  # full device path/symlink (preferred) or a bare int index.
  # Verified 2026-06-25 (this session): by-id symlink below -> /dev/video6,
  # grabs 1280x720. RealSense D405 currently occupies /dev/video0-5.
  c920_device: /dev/v4l/by-id/usb-046d_HD_Pro_Webcam_C920_C26B1F5F-video-index0
  # D405 (eye-in-hand) — by-id paths (stable per UVC stream, so the right index
  # works on both host and container despite /dev/videoN renumbering). Verified
  # 2026-06-25 inside multipanda-container: video-index2 is the COLOR stream
  # (genuine chroma, streams continuously); index4 only yields one cold read
  # then select()-times out. Using by-id also stops the old d405_color_device:6
  # from stealing the C920's /dev/video6.
  d405_color_device: /dev/v4l/by-id/usb-Intel_R__RealSense_TM__Depth_Camera_405_Intel_R__RealSense_TM__Depth_Camera_405_215123071253-video-index2
  d405_depth_device: /dev/v4l/by-id/usb-Intel_R__RealSense_TM__Depth_Camera_405_Intel_R__RealSense_TM__Depth_Camera_405_215123071253-video-index0
  # Lock C920 to manual exposure: the white socket otherwise overexposes to flat
  # white and the bright-bore detector (detect_sockets) can't see it. ~40-120 OK.
  c920_exposure: 100
  c920_fx: 1000.0
  c920_fy: 1000.0
  d405_fx: 430.0
  d405_fy: 430.0
  # camera_publisher streaming (logging path)
  publish_fps: 10.0
  jpeg_quality: 80

socket_cube_height_m: 0.06
