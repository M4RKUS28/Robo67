# Robo67 peg-in-hole configuration. See robo67_insertion/config_schema.py for the schema.
# Values are the design defaults; tune workspace_aabb + contact params in Phase 3/5.

stiffness:
  free_translational: 1000.0   # firmer free-space tracking (tuned in sim Phase 3)
  free_rotational: 30.0
  contact_translational_xy: 150.0
  contact_z: 600.0
  contact_rotational: 20.0
  damping_ratio: 0.9
  nullspace_stiffness: 10.0

spiral:
  max_radius_m: 0.012
  pitch_m: 0.002
  speed_mps: 0.005
  pts_per_rev: 36

safety:
  # SIM-observed generous bounds (sim home EE ~ x0.21 y0.00 z1.10).
  # PHASE 4 TODO: re-tighten to the real reachable workspace (real Panda z_max ~0.9).
  workspace_aabb: [[0.05, 0.75], [-0.50, 0.50], [0.05, 1.20]]
  max_lead_m: 0.05      # MUST stay < 0.1 (controller rejects desired > 0.1 m from current)
  fz_abort_n: 25.0
  watchdog_s: 0.2

insertion:
  standoff_m: 0.05
  approach_tol_m: 0.010
  contact_fz_threshold_n: 5.0
  insert_depth_m: 0.04
  z_drop_threshold_m: 0.004
  retry_limit: 3
  control_rate_hz: 50.0

topics:
  # VERIFIED against the running sim (Phase 0.3). See PHASE0_VERIFIED.md.
  controller_name: panda_cartesian_impedance_controller
  arm_resource: panda
  desired_pose: /panda/panda_cartesian_impedance_controller/desired_pose
  parameters: /panda/panda_cartesian_impedance_controller/parameters
  set_controllers: /multi_mode_controller/set_controllers
  robot_state: /franka_robot_state_broadcaster/robot_state
  error_recovery: /panda_error_recovery_service_server/error_recovery
  gripper_ns: /panda_gripper_sim_node
  socket_pose: /robo67/socket_pose
  socket_detection: /robo67/socket_detection

camera:
  c920_device: 8
  d405_color_device: 6
  d405_depth_device: 2
  c920_fx: 1000.0
  c920_fy: 1000.0
  d405_fx: 430.0
  d405_fy: 430.0

socket_cube_height_m: 0.06
